<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dist/output.css" />
    <title>Tabla de usuarios</title>
  </head>

  <body
    class="min-h-screen w-full bg-linear-to-br from-slate-900 via-purple-900 to-slate-900 flex flex-col items-center justify-start px-4 py-10 md:py-16 md:justify-center text-white"
  >
    <h1
      class="mb-8 text-center text-3xl font-semibold tracking-tight text-white sm:text-4xl lg:text-5xl"
    >
      Tabla de usuarios
    </h1>

    <main class="w-full max-w-5xl space-y-6">
      <section
        class="rounded-2xl bg-linear-to-b from-purple-900/80 to-slate-950/80 shadow-2xl shadow-purple-900/40 backdrop-blur-xl px-4 py-6 sm:px-6 sm:py-8 md:px-8 md:py-10"
      >
        <div
          class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
        >
          <h2 class="text-lg font-medium text-slate-100">
            Listado de usuarios
          </h2>
          <input
            type="search"
            name="searchInput"
            placeholder="Busca por nombre/apellidos (mín. 3 letras)"
            class="w-full sm:w-80 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-white placeholder:text-slate-400 focus:border-white focus:outline-none"
          />
        </div>

        <div
          class="overflow-hidden rounded-xl border border-white/10 bg-black/10"
        >
          <div class="max-h-[60vh] overflow-x-auto overflow-y-auto">
            <table class="min-w-full text-left text-sm">
              <thead
                class="bg-white/5 text-xs uppercase tracking-wide text-slate-300"
              >
                <tr>
                  <th class="px-4 py-3 font-medium">ID</th>
                  <th class="px-4 py-3 font-medium">Nombre</th>
                  <th class="px-4 py-3 font-medium">Apellidos</th>
                  <th class="px-4 py-3 font-medium">Teléfono</th>
                  <th class="px-4 py-3 font-medium">Email</th>
                  <th class="px-4 py-3 font-medium">Sexo</th>
                  <th class="px-4 py-3 font-medium text-center">Acciones</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-white/5" id="tablaBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section
        id="editBox"
        class="rounded-2xl bg-linear-to-b from-purple-900/80 to-slate-950/80 shadow-2xl shadow-purple-900/40 backdrop-blur-xl px-4 py-6 sm:px-6 sm:py-8 md:px-8 md:py-10 space-y-4"
        style="display: none;"
      >
        <h2 class="text-lg font-medium text-slate-100">Editar usuario</h2>

        <form id="editForm" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input
              id="f_nombre"
              type="text"
              placeholder="Nombre"
              required
              class="mt-1 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-slate-400"
            />
            <input
              id="f_apellidos"
              type="text"
              placeholder="Apellidos"
              class="mt-1 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-slate-400"
            />
            <input
              id="f_telefono"
              type="text"
              placeholder="Teléfono"
              class="mt-1 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-slate-400"
            />
            <input
              id="f_email"
              type="email"
              placeholder="Email"
              required
              class="mt-1 block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-slate-400"
            />
          </div>

          <div
            class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
          >
            <select
              id="f_sexo"
              required
              class="w-full sm:w-48 rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder:text-slate-400"
            >
              <option value="masculino">Masculino</option>
              <option value="femenino">Femenino</option>
            </select>

            <div class="flex flex-wrap gap-3 justify-end">
              <button
                type="button"
                id="btnCancel"
                class="inline-flex items-center justify-center rounded-full px-6 py-2 text-sm font-medium text-slate-200 bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-200 cursor-pointer"
              >
                Cancelar
              </button>
              <button
                type="submit"
                class="inline-flex items-center justify-center rounded-full px-6 py-2 text-sm font-semibold text-white bg-fuchsia-500 hover:bg-fuchsia-400 active:bg-fuchsia-600 shadow-lg shadow-fuchsia-900/40 hover:shadow-fuchsia-500/50 hover:-translate-y-0.5 transition-all duration-300 cursor-pointer"
              >
                Guardar
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
